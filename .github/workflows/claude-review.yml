name: Claude PR review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            You are reviewing PR #${{ github.event.pull_request.number }} in
            ${{ github.repository }}.

            STEP 1 — Get the diff:
              gh pr diff ${{ github.event.pull_request.number }}

            STEP 2 — For files needing more context, read them:
              cat <file> or view specific line ranges

            STEP 3 — Review the changes for:
              - Correctness bugs (logic errors, off-by-one, null/None handling,
                race conditions, incorrect error handling)
              - Security issues (injection, auth bypass, secret leakage,
                unsafe deserialization)
              - Performance problems likely to matter in production
              - API/contract breakage
              - Missing tests for non-trivial new logic

            Do NOT comment on:
              - Style/formatting (linters handle this)
              - Naming preferences
              - Minor refactors that don't change behavior
              - Anything you're not confident about

            STEP 4 — Post inline comments on specific lines using the MCP
            inline-comment tool. For each issue:
              - Reference the exact file and line
              - Explain the problem clearly in 1-3 sentences
              - Suggest a concrete fix when possible

            STEP 5 — After inline comments, post ONE summary comment with:
              - Overall assessment (approve / request changes / comment)
              - Count of issues found by severity
              - Anything the author should know that doesn't fit inline

            Be direct. If the PR looks good, say so briefly and stop — don't
            invent problems to justify the review.
          claude_args: >-
            --model claude-sonnet-4-6
            --max-turns 30
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr diff:*),Bash(gh pr view:*),Bash(cat:*),Bash(head:*),Bash(tail:*),Bash(wc:*),Bash(grep:*),Bash(find:*)"
